name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prod=false

      - name: Lint web
        run: pnpm --filter @grandprixpicks/web lint

      - name: Typecheck web
        run: pnpm --filter @grandprixpicks/shared typecheck && pnpm --filter @grandprixpicks/web typecheck

      - name: Test web
        run: pnpm --filter @grandprixpicks/web test:ci

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prod=false

      - name: Lint backend
        run: pnpm --filter @grandprixpicks/backend lint

      - name: Typecheck backend
        run: pnpm --filter @grandprixpicks/shared typecheck && pnpm --filter @grandprixpicks/backend typecheck

  shared:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prod=false

      - name: Typecheck shared
        run: pnpm --filter @grandprixpicks/shared typecheck

  knip:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prod=false

      - name: Run knip
        run: pnpm knip

  web-e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: true
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
      CLERK_JWT_KEY: ${{ secrets.CLERK_JWT_KEY }}
      VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
      CONVEX_DEPLOYMENT: ${{ secrets.CONVEX_DEPLOYMENT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prod=false

      - name: Check required e2e secrets
        id: secret_check
        shell: bash
        run: |
          missing=0
          for name in CLERK_SECRET_KEY VITE_CLERK_PUBLISHABLE_KEY CLERK_JWT_KEY VITE_CONVEX_URL CONVEX_DEPLOYMENT; do
            if [ -z "${!name}" ]; then
              echo "Missing $name"
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "run_e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_e2e=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Skipping web e2e smoke::Required Clerk/Convex secrets are not configured for this repository."
          fi

      - name: Install Playwright browser
        if: ${{ steps.secret_check.outputs.run_e2e == 'true' }}
        run: pnpm exec playwright install --with-deps chromium

      - name: Run web e2e smoke
        if: ${{ steps.secret_check.outputs.run_e2e == 'true' }}
        run: pnpm test:e2e:smoke

      - name: Upload Playwright report
        if: ${{ always() && steps.secret_check.outputs.run_e2e == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: ${{ failure() && steps.secret_check.outputs.run_e2e == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: apps/web/test-results
          if-no-files-found: ignore
