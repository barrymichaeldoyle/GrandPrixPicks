name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prod=false

      - name: Lint web
        run: pnpm --filter @grandprixpicks/web lint

      - name: Typecheck web
        run: pnpm --filter @grandprixpicks/shared typecheck && pnpm --filter @grandprixpicks/web typecheck

      - name: Test web
        run: pnpm --filter @grandprixpicks/web test:ci

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prod=false

      - name: Lint backend
        run: pnpm --filter @grandprixpicks/backend lint

      - name: Typecheck backend
        run: pnpm --filter @grandprixpicks/shared typecheck && pnpm --filter @grandprixpicks/backend typecheck

  shared:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prod=false

      - name: Typecheck shared
        run: pnpm --filter @grandprixpicks/shared typecheck

  knip:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prod=false

      - name: Run knip
        run: pnpm knip

  web-e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: true
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
      CLERK_JWT_KEY: ${{ secrets.CLERK_JWT_KEY }}
      VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
      CONVEX_DEPLOYMENT: ${{ secrets.CONVEX_DEPLOYMENT }}
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prod=false

      - name: Check required e2e secrets
        id: secret_check
        shell: bash
        run: |
          missing=0
          for name in CLERK_SECRET_KEY VITE_CLERK_PUBLISHABLE_KEY CLERK_JWT_KEY VITE_CONVEX_URL CONVEX_DEPLOYMENT CONVEX_DEPLOY_KEY; do
            if [ -z "${!name}" ]; then
              echo "Missing $name"
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "run_e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error title=Missing web e2e secrets::Required Clerk/Convex secrets are not configured for this repository."
            exit 1
          fi

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Verify Convex smoke target
        shell: bash
        run: |
          set -euo pipefail

          namespace="scenario__ci_preflight__${GITHUB_RUN_ID}__${GITHUB_RUN_ATTEMPT}"
          summary_file="$(mktemp)"

          cleanup() {
            pnpm -s scenario -- clear --namespace "$namespace" >/dev/null 2>&1 || true
            rm -f "$summary_file"
          }
          trap cleanup EXIT

          echo "Checking smoke target deployment alignment"
          echo "CONVEX_DEPLOYMENT=$CONVEX_DEPLOYMENT"
          echo "VITE_CONVEX_URL host=$(node --input-type=module -e 'console.log(new URL(process.env.VITE_CONVEX_URL).host)')"

          pnpm -s scenario -- apply race_partial_results_sprint --namespace "$namespace" > "$summary_file"

          (
            cd apps/web
            node --input-type=module - "$summary_file" <<'EOF'
          import fs from 'node:fs';
          import { ConvexHttpClient } from 'convex/browser';
          import { api } from '../backend/convex/_generated/api.js';

          const summaryFile = process.argv[2];
          const rawOutput = fs.readFileSync(summaryFile, 'utf8').trim();
          const jsonStart = rawOutput.indexOf('{');
          const jsonEnd = rawOutput.lastIndexOf('}');

          if (jsonStart === -1 || jsonEnd === -1 || jsonEnd <= jsonStart) {
            throw new Error(`Scenario command did not return JSON.\n${rawOutput}`);
          }

          const summary = JSON.parse(rawOutput.slice(jsonStart, jsonEnd + 1));
          const raceSlug = summary?.race?.slug;

          if (!raceSlug) {
            throw new Error(`Scenario summary did not include a race slug.\n${rawOutput}`);
          }

          const client = new ConvexHttpClient(process.env.VITE_CONVEX_URL);
          const race = await client.query(api.races.getRaceBySlug, { slug: raceSlug });

          if (!race) {
            throw new Error(
              [
                'Seeded race was not readable via VITE_CONVEX_URL.',
                `CONVEX_DEPLOYMENT=${process.env.CONVEX_DEPLOYMENT}`,
                `VITE_CONVEX_URL=${process.env.VITE_CONVEX_URL}`,
                `seededRaceSlug=${raceSlug}`,
                'This usually means the smoke job is seeding one Convex deployment and the web app is reading from another.',
              ].join('\n'),
            );
          }

          console.log(`Verified seeded race ${race.slug} via ${process.env.VITE_CONVEX_URL}`);
          EOF
          )

      - name: Run web e2e smoke
        timeout-minutes: 20
        run: pnpm test:e2e:smoke

      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: apps/web/test-results
          if-no-files-found: ignore
