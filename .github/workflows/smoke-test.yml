name: Smoke Test & Auto-Rollback

on:
  push:
    branches:
      - main

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Wait for Cloudflare Pages deployment
        id: wait-deploy
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_PROJECT_NAME: grand-prix-picks
        run: |
          echo "Waiting for Cloudflare Pages to finish deploying..."
          DEPLOYMENT_ID=""

          for i in $(seq 1 24); do
            RESPONSE=$(curl -s -X GET \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${CF_PROJECT_NAME}/deployments?per_page=1" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json")

            STAGE=$(echo "$RESPONSE" | jq -r '.result[0].latest_stage.name')
            STATUS=$(echo "$RESPONSE" | jq -r '.result[0].latest_stage.status')
            ID=$(echo "$RESPONSE" | jq -r '.result[0].id')

            echo "Attempt $i: stage=$STAGE status=$STATUS id=$ID"

            if [ "$STAGE" = "deploy" ] && [ "$STATUS" = "success" ]; then
              DEPLOYMENT_ID="$ID"
              break
            elif [ "$STAGE" = "deploy" ] && [ "$STATUS" = "failure" ]; then
              echo "CF Pages deployment itself failed — skipping smoke test."
              exit 0
            fi

            sleep 15
          done

          if [ -z "$DEPLOYMENT_ID" ]; then
            echo "Timed out waiting for deployment. Skipping smoke test."
            exit 0
          fi

          echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Run smoke tests
        id: smoke
        if: steps.wait-deploy.outputs.deployment_id != ''
        env:
          PROD_URL: ${{ secrets.PROD_URL }}
        run: |
          echo "Smoke testing $PROD_URL"
          FAILED=0

          check() {
            local ROUTE="$1"
            local CODE
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${PROD_URL}${ROUTE}")
            echo "  GET ${ROUTE} → $CODE"
            if [ "$CODE" = "500" ] || [ "$CODE" = "000" ]; then
              echo "  FAIL"
              FAILED=1
            fi
          }

          check "/"
          check "/races"
          check "/leaderboard"

          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"

      - name: Rollback Cloudflare Pages
        if: steps.smoke.outputs.failed == '1'
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_PROJECT_NAME: grand-prix-picks
          BAD_ID: ${{ steps.wait-deploy.outputs.deployment_id }}
        run: |
          echo "Smoke test failed — rolling back from $BAD_ID"

          # Find the most recent prior successful deployment
          PREV_ID=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${CF_PROJECT_NAME}/deployments?per_page=10" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            | jq -r "[.result[] | select(.id != \"${BAD_ID}\") | select(.latest_stage.name == \"deploy\") | select(.latest_stage.status == \"success\")][0].id")

          if [ -z "$PREV_ID" ] || [ "$PREV_ID" = "null" ]; then
            echo "No previous successful deployment to roll back to."
            exit 1
          fi

          echo "Rolling back to $PREV_ID"
          curl -s -f -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${CF_PROJECT_NAME}/deployments/${PREV_ID}/rollback" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json"
          echo "Rollback triggered."

      - name: Fail if smoke tests failed
        if: steps.smoke.outputs.failed == '1'
        run: exit 1
