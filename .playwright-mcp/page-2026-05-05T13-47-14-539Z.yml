                                - img [ref=e179]
                                - text: When do predictions lock?
                            - paragraph [ref=e183]: Each session locks at its scheduled start time. Qualifying, sprint qualifying (on sprint weekends), the sprint, and the race each have their own deadline. Once a session is locked, you can't change those picks, so get them in before the cutoff.
