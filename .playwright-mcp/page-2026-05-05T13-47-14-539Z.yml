                                - img [ref=e156]
                                - text: How does scoring work?
                            - generic [ref=e160]:
                                - paragraph [ref=e161]: 'The same points system applies to qualifying, sprint qualifying (on sprint weekends), the sprint, and the race. You pick the top 5 for each session; points are awarded by how close your picks are to the actual result:'
                                - list [ref=e162]:
                                    - listitem [ref=e163]:
                                        - generic [ref=e164]: 5 points
                                        - generic [ref=e165]: Exact position match
                                    - listitem [ref=e166]:
                                        - generic [ref=e167]: 3 points
                                        - generic [ref=e168]: One place away, including P5 picked and P6 actual
                                    - listitem [ref=e169]:
                                        - generic [ref=e170]: 1 point
                                        - generic [ref=e171]: Driver finishes in the actual top 5, but is off by 2+ positions
                                    - listitem [ref=e172]:
                                        - generic [ref=e173]: 0 points
                                        - generic [ref=e174]: Driver finishes outside the top 5
                                - paragraph [ref=e175]: Each session scores up to 25 points (all 5 correct). Your weekend total is the sum of quali, sprint (if applicable), and race scores—so sprint weekends can earn you more points.
                                - paragraph [ref=e176]: 'Head-to-Head scoring is separate: each correct teammate matchup earns 1 point per session.'
