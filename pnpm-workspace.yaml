packages:
  - apps/*
  - packages/*

allowBuilds:
  '@clerk/shared': true
  '@sentry/cli': true
  browser-tabs-lock: false
  bufferutil: false
  core-js: false
  esbuild: true
  protobufjs: true
  sharp: true
  utf-8-validate: false
  workerd: true

catalog:
  convex: 1.41.0
  typescript: 6.0.3

minimumReleaseAgeExclude:
  - dompurify@3.4.11
  - '@convex-dev/resend@0.2.5'
  - '@react-email/render@2.0.9'

onlyBuiltDependencies:
  - '@clerk/shared'
  - '@sentry/cli'
  - browser-tabs-lock
  - bufferutil
  - core-js
  - esbuild
  - protobufjs
  - sharp
  - unrs-resolver
  - utf-8-validate
  - workerd

overrides:
  '@expo/dom-webview': 55.0.6
  # Force the latest workpool (transitive via @convex-dev/resend, which allows
  # ^0.4.6) so the email workpool's internal crons run on the newest release.
  '@convex-dev/workpool': 0.4.7
  '@clerk/clerk-js@>=5.22.0 <=5.125.9': 5.125.10
  '@clerk/clerk-react@>=5.9.0 <=5.61.5': 5.61.6
  '@clerk/shared@>=3.0.0 <=3.47.4': 3.47.5
  '@xmldom/xmldom@<0.8.13': 0.8.13
