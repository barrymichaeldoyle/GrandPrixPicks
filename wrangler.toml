name = "grand-prix-picks"
compatibility_date = "2024-01-01"
pages_build_output_dir = "apps/web/dist"

# Required so process.env is populated with Cloudflare Dashboard env vars
# (CLERK_JWT_KEY, CLERK_SECRET_KEY, etc.). Without this, Clerk middleware
# cannot see them and may throw HTTPError -> 500.
compatibility_flags = ["nodejs_compat", "nodejs_compat_populate_process_env"]
